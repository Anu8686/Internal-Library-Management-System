{% extends 'base.html' %}

{% block title %}Register - Library Management System{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">✨ Create Account</h2>
        
        {% if error %}
            <div class="error-message">⚠️ {{ error }}</div>
        {% endif %}

        <form method="post" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" name="username" type="text" required placeholder="Choose a username">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required placeholder="Create a password">
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input id="confirm_password" name="confirm_password" type="password" required placeholder="Confirm your password">
            </div>

            <button type="submit" class="auth-btn">Register</button>
        </form>

        <p class="auth-link">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>
</div>
{% endblock %}
